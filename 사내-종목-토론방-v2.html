<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>사내 종목 토론방</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F4F7; --panel:#FFFFFF; --ink:#101828; --sub:#667085; --line:#E4E7EC;
  --navy:#0F1B2D; --buy:#E5484D; --sell:#3B6FE0; --flat:#98A2B3; --chip:#EEF2F6;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'IBM Plex Sans KR',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);display:flex;flex-direction:column}

header{background:var(--navy);color:#E8EDF5;flex:none;padding:16px 20px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:700;letter-spacing:-.01em}
header .desc{font-size:12px;color:#8FA0B8}
header .save{margin-left:auto;font-size:11.5px;color:#9FB3CC;font-family:var(--mono)}

.bar{display:flex;gap:10px;align-items:center;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap;flex:none}
.tabs{display:flex;gap:6px}
.tab{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;font-family:var(--sans)}
.tab:hover{border-color:#C3CCD9}
.tab.on{background:var(--navy);border-color:var(--navy);color:#fff}
.tab:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--sell);outline-offset:2px}
#q{margin-left:auto;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;width:240px;font-family:var(--sans)}

main{flex:1;display:grid;grid-template-columns:minmax(320px,400px) 1fr;min-height:0}
.list-pane{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
.list-head{padding:8px 16px;font-size:11px;color:var(--sub);border-bottom:1px solid var(--line);flex:none}
#list{overflow-y:auto;flex:1}
.row{display:grid;grid-template-columns:34px 1fr auto;gap:8px;padding:11px 16px;cursor:pointer;align-items:center;background:none;border:none;border-left:3px solid transparent;border-bottom:1px solid #F0F2F5;width:100%;text-align:left;font-family:var(--sans)}
.row:hover{background:#F8FAFC}
.row.sel{background:#F1F5FB;border-left-color:var(--navy)}
.row .rk{font-family:var(--mono);font-size:11px;color:var(--sub)}
.row .nm{min-width:0;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .tk{font-family:var(--mono);font-size:11px;color:var(--sub)}

.detail{overflow-y:auto;min-height:0;padding:22px 26px}
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sub);gap:8px;text-align:center}
.empty .big{font-size:15px;font-weight:600;color:var(--ink)}
#back{display:none;margin-bottom:12px;border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:var(--sans)}
.d-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.d-head h2{font-size:22px;font-weight:700}
.badge{font-size:11px;font-weight:600;background:var(--chip);color:var(--sub);border-radius:6px;padding:3px 8px}
.d-head .tick{font-family:var(--mono);font-size:12px;color:var(--sub)}
.share-note{font-size:11.5px;color:var(--sub);margin-bottom:14px}

.stance-sum{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.stance-sum span{font-size:11.5px;border-radius:6px;padding:3px 9px;background:var(--chip);color:var(--sub);font-family:var(--mono)}
.stance-sum .sb{background:#FDECEC;color:var(--buy)} .stance-sum .ss{background:#EAF0FC;color:var(--sell)}
#refresh{border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:4px 10px;font-size:11.5px;color:var(--sub);cursor:pointer;font-family:var(--sans)}

form.cform{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px}
.cform .r1{display:flex;gap:8px;flex-wrap:wrap}
.cform input[type=text]{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;flex:1;min-width:140px;font-family:var(--sans)}
.stances{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.stances label{padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--sub);cursor:pointer;border-left:1px solid var(--line)}
.stances label:first-child{border-left:none}
.stances input{position:absolute;opacity:0;pointer-events:none}
.stances input:checked+span{color:#fff}
.stances label:has(input:checked){background:var(--flat)}
.stances label.buy:has(input:checked){background:var(--buy)}
.stances label.sell:has(input:checked){background:var(--sell)}
.cform textarea{border:1px solid var(--line);border-radius:8px;padding:10px;font-size:13px;min-height:72px;resize:vertical;font-family:var(--sans)}
.cform .r2{display:flex;align-items:center;gap:10px}
.cform .hint{font-size:11px;color:var(--sub)}
.cform button[type=submit]{margin-left:auto;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.cform button:disabled{opacity:.5;cursor:default}

#clist{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.c-item{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.c-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.c-top .who{font-size:13px;font-weight:600}
.c-top .st{font-size:10.5px;font-weight:700;border-radius:5px;padding:2px 7px}
.st.b{background:#FDECEC;color:var(--buy)} .st.h{background:var(--chip);color:var(--sub)} .st.s{background:#EAF0FC;color:var(--sell)}
.c-top time{font-family:var(--mono);font-size:10.5px;color:var(--sub);margin-left:auto}
.c-del{border:none;background:none;color:var(--sub);font-size:11px;cursor:pointer;padding:2px 4px;font-family:var(--sans)}
.c-del:hover{color:var(--buy);text-decoration:underline}
.c-item p{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.c-empty{font-size:13px;color:var(--sub);text-align:center;padding:28px 0}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:12.5px;border-radius:8px;padding:9px 16px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:9}
.toast.show{opacity:1}

@media (max-width:820px){
  main{grid-template-columns:1fr}
  .list-pane{border-right:none}
  body.viewing .list-pane{display:none}
  body:not(.viewing) .detail{display:none}
  #back{display:inline-block}
  #q{width:100%;margin-left:0}
}
</style>
</head>
<body>

<header>
  <h1>사내 종목 토론방</h1>
  <span class="desc">KOSPI · KOSDAQ · NYSE · NASDAQ 시가총액 상위 100 — 종목을 골라 의견을 나누세요</span>
  <span class="save" id="saveMode"></span>
</header>

<div class="bar">
  <div class="tabs" role="tablist">
    <button class="tab on" data-m="KOSPI" role="tab">코스피</button>
    <button class="tab" data-m="KOSDAQ" role="tab">코스닥</button>
    <button class="tab" data-m="NYSE" role="tab">뉴욕거래소</button>
    <button class="tab" data-m="NASDAQ" role="tab">나스닥</button>
  </div>
  <input id="q" type="search" placeholder="종목명 · 티커 검색">
</div>

<main>
  <section class="list-pane">
    <div class="list-head">시가총액 순 (참고용 순위)</div>
    <div id="list" role="listbox"></div>
  </section>

  <section class="detail">
    <div class="empty" id="empty">
      <div class="big">종목을 선택하세요</div>
      <div>왼쪽 목록에서 종목을 고르면<br>임직원 의견 게시판이 열립니다.</div>
    </div>
    <div id="dbody" style="display:none">
      <button id="back">← 목록으로</button>
      <div class="d-head">
        <h2 id="dname"></h2>
        <span class="badge" id="dmkt"></span>
        <span class="tick" id="dtick"></span>
      </div>
      <div class="share-note">이 게시판의 의견은 앱을 사용하는 모든 임직원에게 공개되며, 삭제 버튼으로 누구나 지울 수 있습니다. 투자 판단의 책임은 본인에게 있습니다.</div>
      <div class="stance-sum" id="csum"></div>

      <form class="cform" id="cform">
        <div class="r1">
          <input type="text" id="nick" placeholder="닉네임 (예: 재무팀 김대리)" maxlength="20" required>
          <div class="stances">
            <label class="buy"><input type="radio" name="st" value="매수" checked><span>매수</span></label>
            <label><input type="radio" name="st" value="중립"><span>중립</span></label>
            <label class="sell"><input type="radio" name="st" value="매도"><span>매도</span></label>
          </div>
        </div>
        <textarea id="ctext" placeholder="이 종목에 대한 의견을 남겨보세요" maxlength="500" required></textarea>
        <div class="r2">
          <span class="hint" id="stMsg"></span>
          <button type="submit" id="csubmit">의견 등록</button>
        </div>
      </form>
      <div id="clist"></div>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

const MLABEL={KOSPI:"코스피",KOSDAQ:"코스닥",NYSE:"뉴욕거래소",NASDAQ:"나스닥"};
const S={};
for(const m in RAW){
  S[m]=RAW[m].map(([tk,nm,cap])=>({tk,nm,cap})).sort((a,b)=>b.cap-a.cap);
  S[m].forEach((s,i)=>s.rank=i+1);
}
let mkt="KOSPI", sel=null, query="";
const $=id=>document.getElementById(id);

/* ============ 저장소: window.storage(공유) → localStorage → 메모리 순 폴백 ============ */
const memStore={};
const store=(()=>{
  if(typeof window.storage!=="undefined"){
    return {
      mode:"공유 저장 · 전 직원 공개",
      async get(k){ try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):[];}catch(e){return [];} },
      async set(k,v){ try{await window.storage.set(k,JSON.stringify(v),true);return true;}catch(e){return false;} }
    };
  }
  try{ // 일반 브라우저에서 파일을 직접 열었을 때
    const t="__t"+Date.now(); localStorage.setItem(t,"1"); localStorage.removeItem(t);
    return {
      mode:"이 브라우저에 저장",
      async get(k){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):[];}catch(e){return [];} },
      async set(k,v){ try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){return false;} }
    };
  }catch(e){}
  return { // 최후 폴백
    mode:"임시 저장 (화면 종료 시 사라짐)",
    async get(k){ return memStore[k]||[]; },
    async set(k,v){ memStore[k]=v; return true; }
  };
})();
$("saveMode").textContent="저장 방식: "+store.mode;
const shared = typeof window.storage!=="undefined";
$("stMsg").textContent = shared ? "" : "※ 지금 환경에서는 의견이 이 기기에만 저장됩니다.";
const ckey=()=>`cmt:${sel.mkt}:${sel.tk}`;

/* ============ 목록 ============ */
const listEl=$("list");
function renderList(){
  const q=query.trim().toLowerCase();
  const rows=S[mkt].filter(s=>!q||s.nm.toLowerCase().includes(q)||s.tk.toLowerCase().includes(q));
  listEl.innerHTML=rows.map(s=>`
    <button class="row ${sel&&sel.mkt===mkt&&sel.tk===s.tk?"sel":""}" data-tk="${s.tk}" role="option">
      <span class="rk">${s.rank}</span>
      <span class="nm">${s.nm}</span>
      <span class="tk">${s.tk}</span>
    </button>`).join("")||`<div class="c-empty">검색 결과가 없습니다</div>`;
}
listEl.addEventListener("click",e=>{
  const r=e.target.closest(".row"); if(!r) return;
  select(mkt,r.dataset.tk);
});
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); mkt=t.dataset.m; query=""; $("q").value=""; renderList();
}));
$("q").addEventListener("input",e=>{query=e.target.value; renderList();});

/* ============ 상세 + 의견 ============ */
function select(m,tk){
  const s=S[m].find(x=>x.tk===tk); if(!s) return;
  sel={mkt:m,tk,s};
  document.body.classList.add("viewing");
  $("empty").style.display="none"; $("dbody").style.display="block";
  $("dname").textContent=s.nm; $("dmkt").textContent=MLABEL[m]; $("dtick").textContent=s.tk;
  renderList(); loadComments();
}
$("back").addEventListener("click",()=>document.body.classList.remove("viewing"));

function fTime(t){
  const diff=(Date.now()-t)/1000, d=new Date(t);
  if(diff<60) return "방금 전";
  if(diff<3600) return Math.floor(diff/60)+"분 전";
  if(diff<86400) return Math.floor(diff/3600)+"시간 전";
  return d.toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"})+" "+d.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",hour12:false});
}
const esc=s=>s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function renderCmts(list){
  const b=list.filter(c=>c.s==="매수").length,h=list.filter(c=>c.s==="중립").length,sl=list.filter(c=>c.s==="매도").length;
  $("csum").innerHTML=`<span class="sb">매수 ${b}</span><span>중립 ${h}</span><span class="ss">매도 ${sl}</span>
    <span>전체 ${list.length}건</span> <button id="refresh" type="button">새로고침</button>`;
  $("refresh").addEventListener("click",loadComments);
  $("clist").innerHTML=list.length?[...list].reverse().map(c=>`
    <div class="c-item">
      <div class="c-top">
        <span class="who">${esc(c.n)}</span>
        <span class="st ${c.s==="매수"?"b":c.s==="매도"?"s":"h"}">${c.s}</span>
        <time>${fTime(c.d)}</time>
        <button class="c-del" data-id="${c.id}" type="button">삭제</button>
      </div>
      <p>${esc(c.t)}</p>
    </div>`).join("")
    :`<div class="c-empty">아직 등록된 의견이 없습니다. 첫 의견을 남겨보세요.</div>`;
}
async function loadComments(){ if(sel) renderCmts(await store.get(ckey())); }
setInterval(()=>{ if(sel&&shared) loadComments(); },20000);

/* 등록 */
$("cform").addEventListener("submit",async e=>{
  e.preventDefault(); if(!sel) return;
  const n=$("nick").value.trim(), t=$("ctext").value.trim();
  const st=document.querySelector('input[name="st"]:checked').value;
  if(!n||!t) return;
  $("csubmit").disabled=true;
  const list=await store.get(ckey());
  const next=[...list,{id:Date.now()+"-"+Math.random().toString(36).slice(2,7),n,s:st,t,d:Date.now()}].slice(-200);
  const ok=await store.set(ckey(),next);
  $("csubmit").disabled=false;
  if(ok){ $("ctext").value=""; renderCmts(next); toast("의견이 등록되었습니다"); }
  else toast("저장에 실패했습니다. 잠시 후 다시 시도해주세요.");
});

/* 삭제 */
$("clist").addEventListener("click",async e=>{
  const btn=e.target.closest(".c-del"); if(!btn||!sel) return;
  if(!confirm("이 의견을 삭제할까요? 삭제하면 되돌릴 수 없습니다.")) return;
  const list=await store.get(ckey());
  const next=list.filter(c=>c.id!==btn.dataset.id);
  const ok=await store.set(ckey(),next);
  if(ok){ renderCmts(next); toast("의견이 삭제되었습니다"); }
  else toast("삭제에 실패했습니다. 잠시 후 다시 시도해주세요.");
});

function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
}

renderList();
</script>
